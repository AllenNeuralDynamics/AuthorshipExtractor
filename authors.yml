# authors.yml — SINGLE SOURCE OF TRUTH for all author data
# MyST reads this via `extends` and keeps fields it knows (name, orcid, roles, affiliations).
# Our authorship-plugin.mjs re-reads this file from disk to get ALL fields,
# including extended ones (credit_levels, section_contributions, timeline, etc.).

